services:
  - type: web
    name: fb-ops-web-report
    runtime: python
    region: oregon
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.web_report_main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: APP_TIMEZONE
        value: Asia/Ho_Chi_Minh
      - key: WEB_REPORT_REFRESH_SECONDS
        value: "600"
      - key: WEB_REPORT_HOST
        value: 0.0.0.0
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_USER_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: PANCAKE_SHOP_ID
        sync: false
      - key: PANCAKE_ACCESS_TOKEN
        sync: false
      - key: PANCAKE_API_KEY
        sync: false
      - key: PANCAKE_API_BASE_URL
        sync: false
      - key: PANCAKE_PAGE_SIZE
        sync: false
      - key: REPORT_THB_TO_VND_RATE
        sync: false
      - key: REPORT_THB_MINOR_UNIT_FACTOR
        sync: false
      - key: RECONCILE_COD_ENABLED
        sync: false
      - key: RECONCILE_COD_STATUS_MAP_PATH
        sync: false

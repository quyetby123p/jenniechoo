services:
  - type: web
    name: fb-ops-web-report
    runtime: python
    region: oregon
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.web_report_main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: APP_TIMEZONE
        value: Asia/Ho_Chi_Minh
      - key: WEB_REPORT_REFRESH_SECONDS
        value: "600"
      - key: WEB_REPORT_HOST
        value: 0.0.0.0
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_USER_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: PANCAKE_SHOP_ID
        sync: false
      - key: PANCAKE_ACCESS_TOKEN
        sync: false
      - key: PANCAKE_API_KEY
        sync: false
      - key: PANCAKE_API_BASE_URL
        sync: false
      - key: PANCAKE_PAGE_SIZE
        sync: false
      - key: REPORT_THB_TO_VND_RATE
        sync: false
      - key: REPORT_THB_MINOR_UNIT_FACTOR
        sync: false
      - key: RECONCILE_COD_ENABLED
        sync: false
      - key: RECONCILE_COD_STATUS_MAP_PATH
        sync: false

  - type: worker
    name: fb-ops-main-bot
    runtime: python
    region: oregon
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.main
    envVars:
      - key: APP_TIMEZONE
        value: Asia/Ho_Chi_Minh
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_USER_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: PANCAKE_SHOP_ID
        sync: false
      - key: PANCAKE_ACCESS_TOKEN
        sync: false
      - key: PANCAKE_API_KEY
        sync: false
      - key: PANCAKE_API_BASE_URL
        sync: false
      - key: PANCAKE_PAGE_SIZE
        sync: false
      - key: REPORT_THB_TO_VND_RATE
        sync: false
      - key: REPORT_THB_MINOR_UNIT_FACTOR
        sync: false
      - key: RECONCILE_COD_ENABLED
        sync: false
      - key: RECONCILE_COD_AUTO_ENABLED
        sync: false
      - key: RECONCILE_COD_SHEET_ENABLED
        sync: false
      - key: PANCAKE_TD_SYNC_ENABLED
        sync: false
      - key: THAI_DUONG_API_BASE_URL
        sync: false
      - key: THAI_DUONG_API_TOKEN
        sync: false

  - type: worker
    name: fb-ops-media-bot
    runtime: python
    region: oregon
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.media_main
    envVars:
      - key: MEDIA_BOT_TIMEZONE
        value: Asia/Ho_Chi_Minh
      - key: MEDIA_BOT_TELEGRAM_TOKEN
        sync: false
      - key: MEDIA_BOT_ALLOWED_USER_ID
        sync: false
      - key: MEDIA_BOT_DAILY_RUN_CAP
        sync: false
      - key: MEDIA_BOT_MEDIA_RESEARCH_ENABLED
        sync: false
      - key: MEDIA_BOT_WORK_PROGRESS_ENABLED
        sync: false
      - key: MEDIA_RESEARCH_SERPAPI_API_KEY
        sync: false
      - key: MEDIA_RESEARCH_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: MEDIA_RESEARCH_CLOUDINARY_UPLOAD_PRESET
        sync: false
      - key: MEDIA_RESEARCH_SHEET_ENABLED
        sync: false
      - key: MEDIA_RESEARCH_SHEET_MODE
        sync: false
      - key: MEDIA_RESEARCH_SHEET_SPREADSHEET_ID
        sync: false
      - key: MEDIA_RESEARCH_SHEET_GID
        sync: false
      - key: MEDIA_RESEARCH_SHEET_OAUTH_CLIENT_ID
        sync: false
      - key: MEDIA_RESEARCH_SHEET_OAUTH_CLIENT_SECRET
        sync: false
      - key: MEDIA_RESEARCH_SHEET_OAUTH_REFRESH_TOKEN
        sync: false

  - type: worker
    name: fb-ops-assistant-bot
    runtime: python
    region: oregon
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.assistant_main
    envVars:
      - key: BOT3_TIMEZONE
        value: Asia/Ho_Chi_Minh
      - key: BOT3_MEMORY_ROOT
        value: memory
      - key: BOT3_MEMORY_INDEX_PATH
        value: storage/assistant_bot/memory.db
      - key: BOT3_TASK_DB_PATH
        value: storage/assistant_bot/tasks.db
      - key: BOT3_TELEGRAM_TOKEN
        sync: false
      - key: BOT3_ALLOWED_USER_ID
        sync: false
      - key: BOT3_OPENAI_ENABLED
        sync: false
      - key: BOT3_OPENAI_API_KEY
        sync: false
      - key: BOT3_OPENAI_MODEL
        sync: false
      - key: BOT3_GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: BOT3_GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: BOT3_GOOGLE_OAUTH_REFRESH_TOKEN
        sync: false
      - key: BOT3_GOOGLE_CALENDAR_IDS
        sync: false
      - key: BOT3_TASKS_ENABLED
        sync: false
      - key: BOT3_TASK_GROUP_CHAT_ID
        sync: false
      - key: BOT3_MANAGER_USER_IDS
        sync: false

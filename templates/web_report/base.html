<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Web Report{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f7f8fa; color: #1e1e1e; }
    .brand-card { border: 1px solid #d8dde5; border-radius: 10px; background: #fff; }
    .metric-card { border: 1px solid #d8dde5; border-radius: 10px; background: #fff; min-height: 130px; }
    .metric-card .label { color: #667085; font-size: 13px; }
    .metric-card .value { font-size: 30px; font-weight: 700; line-height: 1.2; }
    .size-pill { display: inline-block; margin: 3px 6px 3px 0; padding: 3px 8px; border-radius: 999px; background: #eef2f7; font-size: 13px; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
    <div>
      <h1 class="h3 mb-1">Báo cáo vận hành đơn hàng</h1>
      <p class="text-muted mb-2">Timezone: {{ timezone_name }} · Refresh cache: 10 phút</p>
    </div>
    <form class="row g-2 align-items-end" method="get" action="{{ request.path }}">
      <div class="col-auto">
        <label class="form-label small mb-1">Kiểu xem</label>
        <select class="form-select" name="mode">
          <option value="today" {% if selected_mode == "today" %}selected{% endif %}>Hôm nay</option>
          <option value="yesterday" {% if selected_mode == "yesterday" %}selected{% endif %}>Hôm qua</option>
          <option value="date" {% if selected_mode == "date" %}selected{% endif %}>Ngày cố định</option>
          <option value="range" {% if selected_mode == "range" %}selected{% endif %}>Khoảng ngày</option>
        </select>
      </div>
      <div class="col-auto">
        <label class="form-label small mb-1">Ngày</label>
        <input type="date" class="form-control" name="date" value="{{ selected_date }}">
      </div>
      <div class="col-auto">
        <label class="form-label small mb-1">Từ ngày</label>
        <input type="date" class="form-control" name="start_date" value="{{ selected_start_date }}">
      </div>
      <div class="col-auto">
        <label class="form-label small mb-1">Đến ngày</label>
        <input type="date" class="form-control" name="end_date" value="{{ selected_end_date }}">
      </div>
      <div class="col-auto">
        <button class="btn btn-primary" type="submit">Xem</button>
      </div>
    </form>
  </div>
  <div class="small text-muted mb-3">Gợi ý: chọn "Ngày cố định" để xem 1 ngày, chọn "Khoảng ngày" để xem từ ngày A đến ngày B.</div>
  <div class="mb-3">
    <a class="btn btn-sm {% if active_path == '/' %}btn-dark{% else %}btn-outline-dark{% endif %}" href="/?{{ query_string }}">Dashboard</a>
    <a class="btn btn-sm {% if active_path == '/status/waiting' %}btn-dark{% else %}btn-outline-dark{% endif %}" href="/status/waiting?{{ query_string }}">Đơn chờ hàng</a>
    <a class="btn btn-sm {% if active_path == '/status/reconcile-received' %}btn-dark{% else %}btn-outline-dark{% endif %}" href="/status/reconcile-received?{{ query_string }}">Đối soát đã nhận</a>
    <a class="btn btn-sm {% if active_path == '/status/returning' %}btn-dark{% else %}btn-outline-dark{% endif %}" href="/status/returning?{{ query_string }}">Đơn hoàn/đang hoàn</a>
    <a class="btn btn-sm {% if active_path == '/status/pending-reconcile' %}btn-dark{% else %}btn-outline-dark{% endif %}" href="/status/pending-reconcile?{{ query_string }}">Đơn chờ đối soát</a>
    <a class="btn btn-sm btn-outline-secondary" href="/api/v1/snapshot?{{ query_string }}" target="_blank">API Snapshot</a>
  </div>
  {% block content %}{% endblock %}
</div>
</body>
</html>

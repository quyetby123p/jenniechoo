name = "fb-ads-telegram-dispatcher"
main = "src/index.js"
compatibility_date = "2026-06-03"
workers_dev = true

[observability]
enabled = true

[triggers]
crons = [
  "5,35 * * * *",      # Backup +5m for 30-minute Pancake -> Thai Duong sync buckets.
  "5 1 * * *",         # Backup 08:05 Asia/Ho_Chi_Minh morning daily report.
  "5 2 * * *",         # Backup 09:05 Asia/Ho_Chi_Minh token health.
  "5 8 * * 1,5,6",     # Backup 15:05 Asia/Ho_Chi_Minh Mon/Fri cash-in, Sat weekly summary.
  "5 14 * * *",        # Backup 21:05 Asia/Ho_Chi_Minh evening daily report.
]
